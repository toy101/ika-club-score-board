services:
  - type: web
    name: ika-club-score-board-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: TURSO_DATABASE_URL
        sync: false # Renderダッシュボードで手動設定
      - key: TURSO_AUTH_TOKEN
        sync: false # Renderダッシュボードで手動設定
      - key: CORS_ALLOWED_ORIGIN
        sync: false
      - key: API_AUTH_TOKEN
        sync: false
      - key: SEED_TEST_DATA
        value: "if-empty"
